name: Test checkout version from branch name

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse version from branch name
        id: parse
        run: |
          branch="${{ github.event.pull_request.head.ref }}"
          echo "Branch: $branch"
          version=$(echo "$branch" | grep -oE 'v[0-9]+' | head -n1)
          if [ -z "$version" ]; then
            echo "No version (v1, v2, ...) found in branch name '$branch'"
            exit 1
          fi
          echo "Detected version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # PAUSES HERE — mainUser must approve in the Actions tab before this runs
  await-approval:
    needs: detect-version
    runs-on: ubuntu-latest
    environment: checkout-approval
    steps:
      - name: Approved
        run: echo "mainUser approved PR #${{ github.event.pull_request.number }} (branch ${{ github.event.pull_request.head.ref }}, version ${{ needs.detect-version.outputs.version }})"

  test-checkout:
    needs: [detect-version, await-approval]
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.summary.outputs.result }}
    steps:
      - name: Checkout v1
        id: v1
        if: needs.detect-version.outputs.version == 'v1'
        continue-on-error: true
        uses: actions/checkout@v1

      - name: Checkout v2
        id: v2
        if: needs.detect-version.outputs.version == 'v2'
        continue-on-error: true
        uses: actions/checkout@v2

      - name: Checkout v3
        id: v3
        if: needs.detect-version.outputs.version == 'v3'
        continue-on-error: true
        uses: actions/checkout@v3

      - name: Checkout v4
        id: v4
        if: needs.detect-version.outputs.version == 'v4'
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Checkout v5
        id: v5
        if: needs.detect-version.outputs.version == 'v5'
        continue-on-error: true
        uses: actions/checkout@v5

      - name: Checkout v6
        id: v6
        if: needs.detect-version.outputs.version == 'v6'
        continue-on-error: true
        uses: actions/checkout@v6

      - name: Checkout v7
        id: v7
        if: needs.detect-version.outputs.version == 'v7'
        continue-on-error: true
        uses: actions/checkout@v7

      - name: Determine result
        id: summary
        if: always()
        env:
          VERSION: ${{ needs.detect-version.outputs.version }}
          O_V1: ${{ steps.v1.outcome }}
          O_V2: ${{ steps.v2.outcome }}
          O_V3: ${{ steps.v3.outcome }}
          O_V4: ${{ steps.v4.outcome }}
          O_V5: ${{ steps.v5.outcome }}
          O_V6: ${{ steps.v6.outcome }}
          O_V7: ${{ steps.v7.outcome }}
        run: |
          case "$VERSION" in
            v1) outcome="$O_V1" ;;
            v2) outcome="$O_V2" ;;
            v3) outcome="$O_V3" ;;
            v4) outcome="$O_V4" ;;
            v5) outcome="$O_V5" ;;
            v6) outcome="$O_V6" ;;
            v7) outcome="$O_V7" ;;
            *) outcome="skipped" ;;
          esac
          echo "Version $VERSION outcome: $outcome"
          echo "result=$outcome" >> "$GITHUB_OUTPUT"
          {
            echo "## Checkout test — $VERSION"
            echo "Result: **$outcome**"
          } >> "$GITHUB_STEP_SUMMARY"

  commit-result:
    needs: [detect-version, test-checkout]
    if: needs.test-checkout.outputs.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main branch (clean, not the PR)
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Append result to log file
        run: |
          mkdir -p checkout-test-results
          echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ') | PR #${{ github.event.pull_request.number }} | user: ${{ github.event.pull_request.user.login }} | branch: ${{ github.event.pull_request.head.ref }} | version: ${{ needs.detect-version.outputs.version }} | result: success" \
            >> checkout-test-results/log.txt

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checkout-test-results/log.txt
          git commit -m "checkout test: ${{ needs.detect-version.outputs.version }} succeeded (PR #${{ github.event.pull_request.number }} by ${{ github.event.pull_request.user.login }})"
          git push origin main
