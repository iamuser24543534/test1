name: Checkout Version From PR Body and Log

# pull_request_target runs with the base repo's context/token even for PRs
# from forks. This workflow only writes a log file back to the main repo's
# base branch — it never executes the fork's own code.
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: write   # needed to commit/push the log file back to the repo

jobs:
  checkout-detected-version:
    # remove this line if you want this to run for same-repo PRs too
    if: github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest

    steps:
      - name: Detect checkout@vN from PR body
        id: detect
        env:
          # passed as an env var (not interpolated into the script) to avoid
          # shell-injection from untrusted PR body text
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          VERSION=""
          for i in 1 2 3 4 5 6 7; do
            if echo "$PR_BODY" | grep -qiE "checkout@v${i}\b"; then
              VERSION="v${i}"
              break
            fi
          done

          if [ -z "$VERSION" ]; then
            echo "No checkout@vN (1-7) mention found in PR body. Defaulting to v4."
            VERSION="v4"
          fi

          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ---- uses: can't take a dynamic/step-output value, so we declare one
      # step per version and gate each with `if:` — only the matching one runs.
      - name: Checkout with v1
        id: checkout_v1
        if: steps.detect.outputs.version == 'v1'
        continue-on-error: true
        uses: actions/checkout@v1
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          # allow-unsafe-pr-checkout: true

      - name: Checkout with v2
        id: checkout_v2
        if: steps.detect.outputs.version == 'v2'
        continue-on-error: true
        uses: actions/checkout@v2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          # allow-unsafe-pr-checkout: true

      - name: Checkout with v3
        id: checkout_v3
        if: steps.detect.outputs.version == 'v3'
        continue-on-error: true
        uses: actions/checkout@v3
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          # allow-unsafe-pr-checkout: true

      - name: Checkout with v4
        id: checkout_v4
        if: steps.detect.outputs.version == 'v4'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          # allow-unsafe-pr-checkout: true

      - name: Checkout with v5
        id: checkout_v5
        if: steps.detect.outputs.version == 'v5'
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          # allow-unsafe-pr-checkout: true

      - name: Checkout with v6
        id: checkout_v6
        if: steps.detect.outputs.version == 'v6'
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          # allow-unsafe-pr-checkout: true

      - name: Checkout with v7
        id: checkout_v7
        if: steps.detect.outputs.version == 'v7'
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          # allow-unsafe-pr-checkout: true

      - name: Debug — verify what was actually checked out
        run: |
          echo "Expected PR head SHA: ${{ github.event.pull_request.head.sha }}"
          echo "Expected fork repo: ${{ github.event.pull_request.head.repo.full_name }}"
          echo ""
          echo "Actual checked-out HEAD:"
          git rev-parse HEAD
          echo ""
          echo "Actual last commit:"
          git log -1 --format="%H %an %s"
          echo ""
          echo "Remote 'origin' URL:"
          git remote -v
          echo ""
          echo "origin/main tip:"
          git rev-parse origin/main || echo "(no local ref for origin/main)"
 
      - name: Point origin back to the main repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # actions/checkout, when given `repository:`, points 'origin' at
          # THAT repo (the fork) — not this main repo. We have to repoint it
          # back before we can push here.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
 
      - name: Push pull request content to main repository (force)
        run: |
          # WARNING: --force overwrites the main branch's history with the
          # fork's content. Any commits on main that aren't part of this PR's
          # history will be permanently discarded from the branch.
          git push --force origin HEAD:"${{ github.event.pull_request.base.ref }}"
