name: Try Checkout Versions and Log to Main Repo

# pull_request_target runs with the base repo's context/token even for PRs
# from forks. This workflow only ever checks out branches (version1..version7)
# that live in the MAIN repo, and only writes a log file back to the main
# repo's base branch — it never touches or executes the fork's own code.
on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write   # needed to commit/push the log file back to the repo

jobs:
  checkout-and-log:
    # remove this line if you want this to run for same-repo PRs too
    if: github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repository (base branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Try checkout version1~7 and record results
        id: try_checkout
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          mkdir -p logs
          LOGFILE="logs/checkout-log-pr${{ github.event.pull_request.number }}.txt"

          {
            echo "Checkout attempt log"
            echo "PR: #${{ github.event.pull_request.number }} (${{ github.event.pull_request.title }})"
            echo "From fork: ${{ github.event.pull_request.head.repo.full_name }}"
            echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo ""
          } > "$LOGFILE"

          for i in 1 2 3 4 5 6 7; do
            BRANCH="version${i}"
            echo "Trying: $BRANCH"

            if git fetch origin "$BRANCH:$BRANCH" >> "$LOGFILE" 2>&1 && git checkout "$BRANCH" >> "$LOGFILE" 2>&1; then
              echo "[SUCCESS] $BRANCH - checkout succeeded" | tee -a "$LOGFILE"
              git checkout "$BASE_BRANCH" >> "$LOGFILE" 2>&1
            else
              echo "[FAILED] $BRANCH - checkout failed (branch missing or error)" | tee -a "$LOGFILE"
              git checkout "$BASE_BRANCH" >> "$LOGFILE" 2>&1 || true
            fi
          done

          echo "log_file=$LOGFILE" >> "$GITHUB_OUTPUT"

      - name: Commit and push log to main repository
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          LOGFILE="${{ steps.try_checkout.outputs.log_file }}"

          git add "$LOGFILE"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: checkout log for PR #${{ github.event.pull_request.number }}"
            git push origin "HEAD:$BASE_BRANCH"
          fi

      - name: Print summary
        if: always()
        run: cat "${{ steps.try_checkout.outputs.log_file }}" >> "$GITHUB_STEP_SUMMARY"
